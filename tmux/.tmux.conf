# ═══════════════════════════════════════════════════
# tmux config — 為 Ghostty + Claude Code 優化
# ═══════════════════════════════════════════════════

# ── Prefix: Ctrl+A ───────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Claude Code 必要設定 ──────────────────────────
set -g allow-passthrough on          # 通知/進度條穿透
set -g extended-keys on              # Shift+Enter 等組合鍵
set -as terminal-features 'xterm*:extkeys'
set -sg escape-time 0                # 消除 Esc 延遲
set -g default-terminal "tmux-256color"  # 真彩色
set -as terminal-overrides ",*:RGB"
set -g set-clipboard on              # 剪貼簿穿透
set -g history-limit 250000          # 大 scrollback
set -g focus-events on               # TUI 焦點追蹤
set -g mouse on                      # 滑鼠支援

# ── 基本設定 ─────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g bell-action none
set -g visual-bell off

# ── 分割：| 和 - ─────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Vim 風格導航 ─────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── 調整 pane 大小：Prefix + H/J/K/L ────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Window / Session ─────────────────────────────
bind c new-window -c "#{pane_current_path}"
bind n command-prompt -p "New session:" "new-session -s %1"
bind w list-windows
bind ? list-keys

# ── 快捷 ─────────────────────────────────────────
bind z resize-pane -Z              # 全螢幕切換
bind x kill-pane                   # 關掉 pane
bind X kill-window                 # 關掉 window
bind d detach-client               # 離開
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ── 狀態列 ───────────────────────────────────────
set -g status-position bottom
set -g status-style "bg=default,fg=#888888"
set -g status-left "#[fg=#c0c0c0,bold] #S "
set -g status-right "#[fg=#888888] %H:%M "
set -g status-left-length 20
setw -g window-status-format "#[fg=#555555] #I:#W "
setw -g window-status-current-format "#[fg=#c0c0c0,bold] #I:#W "

# ── Plugins ──────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'
set -g @resurrect-capture-pane-contents 'on'

# 初始化 TPM（保持在最後一行）
run '~/.tmux/plugins/tpm/tpm'
