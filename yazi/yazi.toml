[mgr]
ratio = [0, 2, 8]
show_hidden = true
sort_by = "natural"
sort_dir_first = true

[[plugin.prepend_previewers]]
url = "*.md"
run = 'piper -- CLICOLOR_FORCE=1 glow -w=$w -s=dark "$1"'

# git status in file list
[[plugin.prepend_fetchers]]
id = "git"
name = "*"
run = "git"

# full border
[[plugin.prepend_setup]]
run = "full-border"

[opener]
edit = [
  { run = '${EDITOR:-vi} "$@"', block = true, for = "unix" },
]
